# Render Blueprint — deploys the whole Volt Tackle stack on Render.
# Frontend (Next.js) + backend (Fastify) + Postgres + Qdrant, one project.
#
# Deploy: Render dashboard → New → Blueprint → pick this repo.
# See docs/DEPLOY-RENDER.md for the two manual URL steps + enabling real providers.

databases:
  - name: volt-tackle-db
    databaseName: volttackle
    user: volttackle
    plan: free # free Postgres (expires after 90 days; upgrade to keep it)

services:
  # --- Qdrant (semantic memory) -------------------------------------------
  # Private service, reachable internally at http://volt-tackle-qdrant:6333.
  # NOTE: private services require a paid instance (starter). Prefer the free
  # managed Qdrant Cloud instead — see docs/DEPLOY-RENDER.md; then delete this
  # block and set QDRANT_URL + QDRANT_API_KEY on the API service.
  - type: pserv
    name: volt-tackle-qdrant
    runtime: image
    plan: starter
    image:
      url: docker.io/qdrant/qdrant:v1.18.2

  # --- Fastify API --------------------------------------------------------
  - type: web
    name: volt-tackle-api
    runtime: node
    plan: free
    # --include=dev so tsx / prisma / typescript (devDeps) are installed.
    buildCommand: npm install --include=dev && npm run db:generate -w @volt-tackle/database
    # Migrate (required) then best-effort seed + Qdrant index, then start.
    startCommand: >-
      npm run db:deploy -w @volt-tackle/database &&
      (npm run db:seed -w @volt-tackle/database || true) &&
      (npm run qdrant:bootstrap || true) &&
      npm run start -w @volt-tackle/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: KAFKA_DISABLED
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: volt-tackle-db
          property: connectionString
      - key: QDRANT_URL
        value: http://volt-tackle-qdrant:6333
      - key: JWT_SECRET
        generateValue: true
      # Set to your web service URL after the first deploy (see docs).
      - key: CORS_ORIGIN
        sync: false
      # Providers default to offline mock — the app fully works with no keys.
      - key: LLM_PROVIDER
        value: mock
      - key: EMBEDDINGS_PROVIDER
        value: mock
      - key: SAFETY_PROVIDER
        value: mock
      - key: MONITORING_PROVIDER
        value: mock
      - key: DEPLOYMENT_PROVIDER
        value: mock
      - key: REPO_CONTEXT_PROVIDER
        value: none
      - key: OTEL_TRACES_CONSOLE
        value: "true"
      # --- OPTIONAL: enable real providers by setting these secrets in the ---
      # --- Render dashboard, then switch the matching *_PROVIDER above.     ---
      - key: FEATHERLESS_API_KEY
        sync: false
      - key: FEATHERLESS_MODEL
        value: Qwen/Qwen2.5-7B-Instruct
      - key: ENKRYPT_API_KEY
        sync: false
      - key: ENKRYPT_BASE_URL
        value: https://api.enkryptai.com
      - key: GITHUB_TOKEN
        sync: false
      - key: LYZR_API_KEY
        sync: false
      - key: GITAGENT_LYZR_AGENT_ID
        sync: false

  # --- Next.js frontend ---------------------------------------------------
  - type: web
    name: volt-tackle-web
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build -w @volt-tackle/web
    startCommand: cd apps/web && npx next start -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      # Baked into the build — set to your API URL, then trigger a web redeploy.
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
